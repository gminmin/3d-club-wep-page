<!DOCTYPE html>

<body>

    <!-- 
    [사용 가이드 / User Guide]
    이 파일(portfolio.html)은 포트폴리오의 '틀(Layout)'을 담당합니다.
    실제 이력서 내용(이름, 소개, 학력, 프로젝트 등)은 'script.js' 파일에 있습니다!
    
    - 디자인/배치를 바꾸려면? -> 이 파일(portfolio.html)과 style.css를 수정하세요.
    - 글자/내용을 바꾸려면? -> script.js 파일을 열고 'memberData' 부분을 수정하세요.
    -->

    <!-- Global Immersive Background (Matches other pages) -->
    <div class="global-background"></div>

    <nav class="navbar scrolled">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 1rem;">
                <img src="3d 동아리 로고.png" alt="진부중학교 3D 동아리 로고" class="nav-logo">
                <span class="nav-title" data-i18n="nav.title">진부중학교 3D 동아리</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" data-i18n="nav.home">홈으로</a></li>
            <li><a href="gallery.html" data-i18n="nav.gallery">갤러리</a></li>
            <li><a href="#" class="nav-join-highlight" data-i18n="nav.portfolio">포트폴리오</a></li>
            <li class="lang-dropdown">
                <button class="lang-dropbtn">Language ▾</button>
                <div class="lang-dropdown-content">
                    <a href="#" data-lang="ko">한국어</a>
                    <a href="#" data-lang="en">English</a>
                </div>
            </li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main id="portfolio-content" class="cv-container">
        <!-- Default State -->
        <div class="empty-state">
            <h1 class="bounce-text">부원 포트폴리오</h1>
            <p>열람하실 부원의 프로필을 선택해주세요.</p>
            <div class="cv-selector">
                <a href="?member=kms" class="cv-link">강민수</a>
                <a href="?member=loy" class="cv-link">이온유</a>
                <a href="?member=csh" class="cv-link">최승호</a>
            </div>
        </div>
    </main>

    <!-- 
        [CV 템플릿 / CV Template]
        아래 <template> 태그 안의 내용은 화면에 바로 보이지 않고, 
        script.js가 데이터를 채워 넣을 때 복사해서 사용합니다.
    -->
    <template id="portfolio-template">
        <div class="cv-paper">
            <!-- Header Section -->
            <header class="cv-header">
                <div class="cv-header-left">
                    <h1 class="cv-name" id="cv-name">이름</h1>
                    <p class="cv-role" id="cv-role">역할/소속</p>
                    <p class="cv-contact" id="cv-contact">email@example.com</p>
                    <div class="cv-links" id="cv-links">
                        <!-- 링크가 여기에 주입됩니다 -->
                    </div>
                </div>
                <div class="cv-header-right">
                    <div class="cv-photo" id="cv-photo"></div>
                </div>
            </header>

            <hr class="cv-divider">

            <!-- Summary -->
            <section class="cv-section">
                <h2 class="cv-section-title">핵심 역량 및 소개</h2>
                <p class="cv-summary-text" id="cv-summary">이곳에 소개 내용이 표시됩니다.</p>
            </section>

            <!-- Education -->
            <section class="cv-section">
                <h2 class="cv-section-title">학력 및 활동</h2>
                <ul class="cv-list" id="cv-education">
                    <!-- Education items -->
                </ul>
            </section>

            <!-- Skills -->
            <section class="cv-section">
                <h2 class="cv-section-title">보유 기술</h2>
                <div class="cv-skills-grid" id="cv-skills">
                    <!-- Skills items -->
                </div>
            </section>

            <!-- Awards -->
            <section class="cv-section">
                <h2 class="cv-section-title">수상 및 경력</h2>
                <ul class="cv-list" id="cv-awards">
                    <!-- Awards items -->
                </ul>
            </section>

            <!-- Key Projects (Case Studies) -->
            <section class="cv-section page-break">
                <h2 class="cv-section-title">주요 프로젝트</h2>
                <div id="cv-projects">
                    <!-- Project case studies -->
                </div>
            </section>
        </div>
    </template>

                                <path
                                    d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
                            </svg>
                        </a>
                        <a href="https://www.instagram.com/jinbu_3d/" class="social-icon instagram" target="_blank"
                            aria-label="Instagram">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204 0.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.981 1.28.058 1.688.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z" />
                            </svg>
                        </a>
                    </span>
                </p>
                <p>&copy; 2026 진부중학교 3D 동아리. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="portfolio-data.js"></script>
    <script src="script.js"></script>
    <script>
        // Apply version to all CSS and JS files
        (function () {
            if (window.CACHE_VERSION) {
                var v = window.CACHE_VERSION;
                var h = window.location.hostname;
                document.querySelectorAll('link[rel="stylesheet"]').forEach(function (l) {
                    if (l.href && !l.href.includes('fonts.googleapis.com') && !l.href.includes('?v=')) {
                        l.href += (l.href.includes('?') ? '&' : '?') + 'v=' + v;
                    }
                });
                document.querySelectorAll('script[src]').forEach(function (s) {
                    if (s.src && !s.src.includes('version.js') && !s.src.includes('?v=')) {
                        if (!s.src.includes('://') || s.src.includes(h)) {
                            s.src += (s.src.includes('?') ? '&' : '?') + 'v=' + v;
                        }
                    }
                });
            }
        })();
    </script>
</body>

</html>
