<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 동아리 가상 전시관</title>
    <script src="version.js"></script>
    <link rel="stylesheet" href="exhibition.css" />
</head>

<div id="art-modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeArtwork()">×</button>
        <img id="art-image" />
        <h2 id="art-title"></h2>
        <p class="author" id="art-author"></p>
        <p id="art-desc"></p>
    </div>
</div>

<body>
    <a href="index.html" class="back-btn" data-i18n="nav.back">홈으로 돌아가기</a>
    <div id="viewer"></div>
    <div class="gallery-ui">마우스로 드래그하여 둘러보세요</div>

    <script src="https://unpkg.com/three@0.159.0/build/three.min.js"></script>
    <script src="translations.js"></script>
    <script src="exhibition-data.js"></script>
    <script src="exhibition.js"></script>
    <script>
        // Localization Logic
        function updateLanguage(lang) {
            document.documentElement.lang = lang;
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.translations && window.translations[lang] && window.translations[lang][key]) {
                    el.innerText = window.translations[lang][key];
                }
            });
        }

        // Apply version to all CSS and JS files
        if (window.CACHE_VERSION) {
            document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                if (!link.href.includes('://') && !link.href.includes('?v=')) {
                    link.href += '?v=' + window.CACHE_VERSION;
                }
            });
            document.querySelectorAll('script[src]').forEach(script => {
                if (!script.src.includes('://') || script.src.includes(window.location.hostname)) {
                    if (!script.src.includes('?v=') && !script.src.includes('version.js')) {
                        script.src += '?v=' + window.CACHE_VERSION;
                    }
                }
            });
        }

        // Initialize language (default to Korean or saved preference)
        document.addEventListener('DOMContentLoaded', () => {
            updateLanguage('ko');
        });
    </script>
</body>

</html>
