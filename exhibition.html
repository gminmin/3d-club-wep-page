<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>360 전시 – 진부중학교 3D 동아리</title>
  <link rel="icon" type="image/png" href="web_icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111315;
      --panel: #1a1d21;
      --panel-border: #2a2f35;
      --text: #f2f4f7;
      --muted: #c0c6cf;
      --accent: #d9dde3;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans KR", "Inter", system-ui, sans-serif;
      touch-action: none;
    }

    #canvas-root {
      position: fixed;
      inset: 0;
      z-index: 0;
      touch-action: none;
      cursor: grab;
    }

    #canvas-root.dragging {
      cursor: grabbing;
    }

    #canvas-root canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .overlay > * { pointer-events: auto; }
    .overlay > .Operation-Guide,
    .overlay > .info {
      pointer-events: none;
    }

    .info {
      position: absolute;
      left: 24px;
      bottom: 24px;
      width: min(360px, calc(100vw - 48px));
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(10, 14, 22, 0.86);
    }
    .info-title {
      margin: 0 0 6px;
      font-size: 1.05rem;
      font-weight: 900;
      line-height: 1.35;
    }
    .info-desc {
      margin: 0;
      color: #d4dceb;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.72);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-box {
      text-align: center;
      padding: 24px 28px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      min-width: min(320px, calc(100vw - 48px));
    }
    .loader-spinner {
      width: 36px;
      height: 36px;
      margin: 0 auto 14px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .error-panel {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
    }
    .error-panel.visible { display: grid; }
    .error-card {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
    }
    .error-card h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      font-weight: 800;
    }
    .error-card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }
    .error-card code {
      display: block;
      padding: 10px 12px;
      margin-bottom: 16px;
      background: #121417;
      border: 1px solid var(--panel-border);
      color: #e8edf5;
      font-size: 0.82rem;
      word-break: break-all;
    }
    .error-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .error-actions button,
    .error-actions label {
      border: 0;
      padding: 12px 16px;
      font-weight: 800;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .error-actions .primary {
      background: var(--accent);
      color: #111315;
    }
    .error-actions .secondary {
      background: #20242a;
      color: var(--text);
      border: 1px solid var(--panel-border);
    }
    .file-input { display: none; }

    .Operation-Guide {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: #f2f4f7;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .info {
        left: 14px;
        right: 14px;
        bottom: 14px;
        width: auto;
        padding: 12px 14px;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="canvas-root" aria-hidden="true"></div>

  <div class="overlay">
    <div class="Operation-Guide" id="Operation-Guide">드래그하여 둘러보기 · 스크롤/핀치로 확대/축소</div>

    <aside class="info" id="info" hidden>
      <h2 class="info-title" id="info-title"></h2>
      <p class="info-desc" id="info-desc"></p>
    </aside>
  </div>

  <div class="loader" id="loader">
    <div class="loader-box">
      <div class="loader-spinner"></div>
      <p class="loader-text" id="loader-text">파노라마를 불러오는 중…</p>
    </div>
  </div>

  <section class="error-panel" id="error-panel">
    <div class="error-card">
      <h1>파노라마를 불러올 수 없습니다</h1>
      <p id="error-message">이미지 경로를 확인하거나, 아래에서 직접 equirectangular(2:1) 이미지를 선택해 주세요.</p>
      <code id="error-path"></code>
      <div class="error-actions">
        <label class="secondary" for="file-input">이미지 선택</label>
        <input class="file-input" id="file-input" type="file" accept="image/*" />
        <button class="primary" id="error-retry" type="button">다시 시도</button>
      </div>
    </div>
  </section>

  <script type="module" src="dataService.js?v=2026-07-08-exhibition"></script>

  <script type="module">
    const FIREBASE_BUCKET = "jb3d-a98fd.firebasestorage.app";
    let items = [];

    const state = {
      index: 0,
      loading: false,
      objectUrl: null,
    };

    // 구형 좌표계 각도 변환 및 줌 설정
    let lon = 0, lat = 0;
    let phi = 0, theta = 0;
    let fov = 75;

    // 관성 회전용 속도 변환
    let targetLon = 0, targetLat = 0;
    let isUserInteracting = false;
    let onPointerDownLon = 0, onPointerDownLat = 0;
    let onPointerDownPointerX = 0, onPointerDownPointerY = 0;

    // 핀치 줌 상태 기록
    let startTouchDistance = 0;
    let startFov = 75;

    // DOM 참조
    const loaderEl = document.getElementById("loader");
    const loaderTextEl = document.getElementById("loader-text");
    const infoEl = document.getElementById("info");
    const infoTitleEl = document.getElementById("info-title");
    const infoDescEl = document.getElementById("info-desc");
    const errorPanelEl = document.getElementById("error-panel");
    const errorMessageEl = document.getElementById("error-message");
    const errorPathEl = document.getElementById("error-path");
    const fileInputEl = document.getElementById("file-input");
    const errorRetryEl = document.getElementById("error-retry");
    const root = document.getElementById("canvas-root");

    const FOV_MIN = 40;
    const FOV_MAX = 95;
    let fullscreenPending = true;

    // ── Three.js 엔진 초기화 ──────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(fov, window.innerWidth / window.innerHeight, 1, 1100);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    root.appendChild(renderer.domElement);

    // 내부를 바라보는 구(Sphere) 메쉬 생성
    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1); // 텍스처 뒤집어서 안쪽에서 보이게 처리
    const material = new THREE.MeshBasicMaterial();
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const textureLoader = new THREE.TextureLoader();
      textureLoader.setCrossOrigin('anonymous'); // CORS 문제 해결을 위해 이 라인을 반드시 추가합니다.

    function resizeCanvas() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ── UI 제어 유틸 ───────────────────────────────────────────
    function setLoading(on, text) {
      state.loading = on;
      loaderEl.classList.toggle("hidden", !on);
      if (text) loaderTextEl.textContent = text;
    }

    function showError(message, path) {
      setLoading(false);
      errorMessageEl.textContent = message;
      errorPathEl.textContent = path || "";
      errorPanelEl.classList.add("visible");
    }

    function hideError() {
      errorPanelEl.classList.remove("visible");
    }

    function revokeObjectUrl() {
      if (state.objectUrl) {
        URL.revokeObjectURL(state.objectUrl);
        state.objectUrl = null;
      }
    }

    // ── 이미지 주소 파싱 ─────────────────────────────────────────
    function isFirebaseStorageUrl(src) {
      return /^https:\/\/firebasestorage\.googleapis\.com\//.test(src);
    }

    function parseFirebaseStoragePath(src) {
      if (isFirebaseStorageUrl(src)) {
        const match = src.match(/\/o\/([^?]+)/);
        return match ? decodeURIComponent(match[1]) : null;
      }
      if (src.startsWith("http") || src.startsWith("blob:") || src.startsWith("data:")) {
        return null;
      }
      return src.replace(/^\/+/, "");
    }

    function toPublicImageUrl(src) {
      if (isFirebaseStorageUrl(src) || src.startsWith("blob:") || src.startsWith("data:")) {
        return src;
      }
      if (src.startsWith("http")) return src;
      const storagePath = parseFirebaseStoragePath(src);
      if (!storagePath) return src;
      return `https://firebasestorage.googleapis.com/v0/b/${FIREBASE_BUCKET}/o/${encodeURIComponent(storagePath)}?alt=media`;
    }

    // ── 파노라마 로더 (WebGL 텍스처 바인딩) ──────────────────────
    function loadPanorama(src) {
      hideError();
      setLoading(true, "파노라마를 불러오는 중…");

      const url = toPublicImageUrl(src);

      return new Promise((resolve, reject) => {
        textureLoader.load(
          url,
          (texture) => {
            texture.minFilter = THREE.LinearFilter;
            texture.generateMipmaps = false;
            
            if (material.map) material.map.dispose();
            material.map = texture;
            material.needsUpdate = true;

            // 시점 초기화
            lon = 0; lat = 0;
            targetLon = 0; targetLat = 0;
            fov = 75;
            camera.fov = fov;
            camera.updateProjectionMatrix();

            setLoading(false);
            resolve();
          },
          undefined,
          (err) => {
            reject(new Error(`텍스처 로드 실패: ${url}`));
          }
        );
      });
    }

    // ── 데이터 연동 ───────────────────────────────────────────
    function normalizeExhibitionItem(raw) {
      return {
        id: raw.id || raw.docId || "",
        src: raw.imageUrl || raw.src || raw.fileUrl || "",
        title: raw.title || "",
        description: raw.description || "",
      };
    }

    async function waitForDataService(maxRetries = 50) {
      for (let i = 0; i < maxRetries; i += 1) {
        if (window.dataService?.getExhibitionItems) return window.dataService;
        await new Promise((resolve) => setTimeout(resolve, 100));
      }
      throw new Error("dataService를 불러올 수 없습니다.");
    }

    async function loadExhibitionItems() {
      const params = new URLSearchParams(location.search);
      const customSrc = params.get("src");

      if (customSrc) {
        items = [{ src: customSrc, title: "사용자 지정 파노라마", description: "" }];
        return;
      }

      const ds = await waitForDataService();
      const rows = await ds.getExhibitionItems();
      items = rows.map(normalizeExhibitionItem).filter((item) => item.src);

      if (!items.length) {
        throw new Error("등록된 전시 파노라마가 없습니다.");
      }

      const customIndex = params.has("p") ? Number(params.get("p")) : null;
      if (Number.isFinite(customIndex)) {
        state.index = Math.max(0, Math.min(items.length - 1, customIndex));
      }
    }

    function updateInfo() {
      const item = items[state.index];
      if (!item) return;

      const hasMeta = item.title || item.description;
      infoEl.hidden = !hasMeta;
      infoTitleEl.textContent = item.title || "";
      infoDescEl.textContent = item.description || "";
    }

    async function enterFullscreen() {
      if (!fullscreenPending || document.fullscreenElement || !document.documentElement.requestFullscreen) return;
      try {
        await document.documentElement.requestFullscreen();
        fullscreenPending = false;
      } catch {}
    }

    // ── 통합 포인터(마우스/터치 드래그) 이벤트 ──────────────────────────
    function onPointerDown(event) {
      if (event.isPrimary === false) return;
      enterFullscreen();

      isUserInteracting = true;
      root.classList.add("dragging");

      onPointerDownPointerX = event.clientX;
      onPointerDownPointerY = event.clientY;

      onPointerDownLon = lon;
      onPointerDownLat = lat;
    }

    function onPointerMove(event) {
      if (event.isPrimary === false || !isUserInteracting) return;

      // 시야각(FOV)이 좁을수록 정밀하게 회전하도록 보정
      const factor = fov / 75; 
      targetLon = (onPointerDownPointerX - event.clientX) * 0.15 * factor + onPointerDownLon;
      targetLat = (event.clientY - onPointerDownPointerY) * 0.15 * factor + onPointerDownLat;
    }

    function onPointerUp(event) {
      if (event.isPrimary === false) return;
      isUserInteracting = false;
      root.classList.remove("dragging");
    }

    // 마우스 스크롤 줌
    function onDocumentMouseWheel(event) {
      fov += event.deltaY * 0.05;
      fov = Math.max(FOV_MIN, Math.min(FOV_MAX, fov));
      camera.fov = fov;
      camera.updateProjectionMatrix();
    }

    // 모바일 멀티터치 핀치 줌 처리
    function onTouchStart(event) {
      if (event.touches.length === 2) {
        isUserInteracting = false; 
        const dx = event.touches[0].pageX - event.touches[1].pageX;
        const dy = event.touches[0].pageY - event.touches[1].pageY;
        startTouchDistance = Math.hypot(dx, dy);
        startFov = fov;
      }
    }

    function onTouchMove(event) {
      if (event.touches.length === 2 && startTouchDistance > 0) {
        const dx = event.touches[0].pageX - event.touches[1].pageX;
        const dy = event.touches[0].pageY - event.touches[1].pageY;
        const currentDistance = Math.hypot(dx, dy);
        
        const factor = startTouchDistance / currentDistance;
        fov = startFov * factor;
        fov = Math.max(FOV_MIN, Math.min(FOV_MAX, fov));
        camera.fov = fov;
        camera.updateProjectionMatrix();
      }
    }

    // 로컬 파일 업로드 처리
    function loadLocalFile(file) {
      if (!file) return;
      revokeObjectUrl();
      const url = URL.createObjectURL(file);
      state.objectUrl = url;

      items.length = 0;
      items.push({
        src: url,
        title: file.name.replace(/\.[^.]+$/, ""),
        description: "로컬에서 불러온 파노라마",
      });
      state.index = 0;
      updateInfo();
      loadPanorama(url).catch(() => {
        showError("선택한 파일을 파노라마로 표시할 수 없습니다.", file.name);
      });
    }

    // ── 메인 애니메이션 루프 (관성 인터폴레이션 포함) ─────────────────
    function animate() {
      requestAnimationFrame(animate);

      if (isUserInteracting === false) {
        // 부드러운 관성 감쇠 알고리즘 (Lerp)
        lon += (targetLon - lon) * 0.15;
        lat += (targetLat - lat) * 0.15;
      } else {
        lon = targetLon;
        lat = targetLat;
      }

      // 90도 회전 제한으로 화면 뒤집힘 방지
      lat = Math.max(-85, Math.min(85, lat));

      phi = THREE.MathUtils.degToRad(90 - lat);
      theta = THREE.MathUtils.degToRad(lon);

      // 구형 삼각함수를 기반으로 카메라가 바라보는 3D 벡터 계산
      const target = new THREE.Vector3();
      target.x = 500 * Math.sin(phi) * Math.sin(theta);
      target.y = 500 * Math.cos(phi);
      target.z = 500 * Math.sin(phi) * Math.cos(theta);

      camera.lookAt(target);
      renderer.render(scene, camera);
    }

    // ── 이벤트 바인딩 및 초기화 ────────────────────────────────────
    fileInputEl.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      loadLocalFile(file);
      e.target.value = "";
    });

    errorRetryEl.addEventListener("click", () => {
      hideError();
      init().catch((error) => {
        showError("데이터를 다시 불러오지 못했습니다.", items[state.index]?.src || "");
      });
    });

    window.addEventListener("resize", resizeCanvas);

    // PointerEvents 하나로 마우스와 터치를 모두 유연하게 핸들링
    root.addEventListener("pointerdown", onPointerDown);
    root.addEventListener("pointermove", onPointerMove);
    root.addEventListener("pointerup", onPointerUp);
    root.addEventListener("pointercancel", onPointerUp);
    root.addEventListener("wheel", onDocumentMouseWheel, { passive: true });

    // 멀티터치(핀치줌)를 위한 팹 터치 가로채기
    root.addEventListener("touchstart", onTouchStart, { passive: true });
    root.addEventListener("touchmove", onTouchMove, { passive: true });

    async function init() {
      try {
        await loadExhibitionItems();
        updateInfo();
        await loadPanorama(items[state.index].src);
      } catch (error) {
        console.error(error);
        showError("파노라마 초기화에 실패했습니다.", items[state.index]?.src || "");
      }
    }

    animate();
    init();
  </script>
</body>
</html>
